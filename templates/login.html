<!DOCTYPE html>
<html>
<head>
    <title>Nepal Telecom Login</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-card{
            background:white;
            width:400px;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            text-align:center;
        }

        img{
            width:100px;
            margin-bottom:15px;
        }

        h2{
            color:#003893;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ddd;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            background:#003893;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .error{
            color:red;
            margin-top:10px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <img src="/media/logo.png">

    <h2>Nepal Telecom Login</h2>

    {% for message in messages %}
        <p class="error">{{ message }}</p>
    {% endfor %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
